{% extends 'base.html' %}
{% block title %}Bad Request{% endblock %}
{% block content %}
<div class="container">
  <div style="max-width:720px;margin:80px auto;padding:40px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);">

</div>
{% endblock %}
