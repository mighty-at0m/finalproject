<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            margin: 30px auto;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #e94560; font-size: 24px; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { color: rgba(255,255,255,0.7); font-size: 13px; display: block; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #e94560; }
        .btn {
            width: 100%;
            padding: 13px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #c73652; }
        .error {
            background: rgba(233,69,96,0.2);
            border: 1px solid #e94560;
            color: #e94560;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #e94560; text-decoration: none; font-size: 13px; }
        .link p { color: rgba(255,255,255,0.5); font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎓 Smart Attendance</h1>
            <p>Create Your Account</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Matric Number</label>
                <input type="text" name="matric_no" placeholder="e.g. AEF/2021/001" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="e.g. john@aefunai.edu.ng" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Parent/Guardian Phone Number</label>
                <input type="text" name="parent_phone" placeholder="e.g. 08012345678" required>
            </div>
            <input type="hidden" name="device_hash" id="device_hash">
<script>
    // Generate device fingerprint and inject into form
    function getDeviceHash() {
        const data = navigator.userAgent + screen.width + screen.height + navigator.language + navigator.platform;
        let hash = 0;
        for (let i = 0; i < data.length; i++) {
            hash = ((hash << 5) - hash) + data.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash).toString(16);
    }
    document.getElementById('device_hash').value = getDeviceHash();
</script>
            <button type="submit" class="btn">Register</button>
        </form>
        <div class="link">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
</body>
</html>
