<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Attendance - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--red:#e94560;--bg1:#0d1117;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#f0f6fc;--muted:rgba(240,246,252,0.5)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{font-family:'Space Grotesk',sans-serif;background:var(--bg1);color:var(--text)}
        body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;background:radial-gradient(ellipse at top left,rgba(233,69,96,0.1) 0%,transparent 60%),var(--bg1);position:relative;background-size:140% 140%,auto;animation:bgFloat 16s ease-in-out infinite}
        body::before,body::after{content:'';position:fixed;width:300px;height:300px;border-radius:50%;filter:blur(42px);z-index:0;pointer-events:none;animation:drift 12s ease-in-out infinite;will-change:transform,opacity}
        body::before{top:-90px;left:-100px;background:rgba(233,69,96,0.16)}
        body::after{right:-120px;bottom:-120px;background:rgba(0,180,216,0.12);animation-delay:-5s}
        .container{width:100%;max-width:440px;background:var(--glass);border:1px solid var(--border);border-radius:24px;padding:32px 24px;position:relative;z-index:1;animation:floatIn .7s ease both;overflow:hidden}
        .container::before{content:'';position:absolute;inset:-1px;border-radius:inherit;padding:1px;background:linear-gradient(120deg,rgba(255,255,255,.34),rgba(233,69,96,.34),rgba(0,180,216,.24),rgba(255,255,255,.28));background-size:220% 220%;animation:borderFlow 7s linear infinite;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
        .container::after{content:'';position:absolute;top:-120%;left:-30%;width:60%;height:260%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:rotate(18deg);animation:sheen 5.8s ease-in-out infinite;pointer-events:none}
        .logo{text-align:center;margin-bottom:24px}
        .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--red),#ff6b6b);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(233,69,96,0.3);animation:iconPulse 3.2s ease-in-out infinite;position:relative;isolation:isolate;will-change:transform,box-shadow}
        .logo-icon::before,.logo-icon::after{content:'';position:absolute;inset:-8px;border-radius:22px;border:1px solid rgba(255,255,255,.24);opacity:0;pointer-events:none;animation:ringPulse 2.8s ease-out infinite}
        .logo-icon::after{inset:-16px;border-color:rgba(233,69,96,.35);animation-delay:1.2s}
        .logo h1{font-size:20px;font-weight:700}
        .logo p{font-size:13px;color:var(--muted);margin-top:3px}
        .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .form-group{margin-bottom:14px;opacity:0;transform:translateY(8px);animation:fadeUp .42s ease forwards}
        form .form-group:nth-of-type(1){animation-delay:.12s}
        form .form-group:nth-of-type(2){animation-delay:.16s}
        form .form-group:nth-of-type(3){animation-delay:.20s}
        form .form-group:nth-of-type(4){animation-delay:.24s}
        form .form-group:nth-of-type(5){animation-delay:.28s}
        form .form-group:nth-of-type(6){animation-delay:.32s}
        form .form-group:nth-of-type(7){animation-delay:.36s}
        label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase}
        input,select{width:100%;padding:13px 15px;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color .22s,background .22s,transform .22s,box-shadow .22s;-webkit-appearance:none}
        input:focus,select:focus{border-color:var(--red);background:rgba(233,69,96,0.05);transform:translateY(-1px);box-shadow:0 10px 20px rgba(233,69,96,0.14)}
        input::placeholder{color:rgba(255,255,255,0.2)}
        select option{background:#161b22}
        select:disabled{opacity:0.4;cursor:not-allowed}
        .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--red),#ff6b6b);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(233,69,96,0.35);margin-top:10px;transition:transform .18s,box-shadow .22s,filter .2s;animation:fadeUp .45s ease both;animation-delay:.42s;position:relative;overflow:hidden}
        .btn::before{content:'';position:absolute;top:0;left:-120%;width:120%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.26),transparent);transition:left .5s ease}
        .btn:hover::before{left:120%}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(233,69,96,0.42);filter:brightness(1.03)}
        .btn:active{transform:scale(0.98)}
        .error{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3);color:#ff8099;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center}
        .tip{background:rgba(0,180,216,0.08);border:1px solid rgba(0,180,216,0.15);border-radius:10px;padding:10px 13px;font-size:12px;color:rgba(0,180,216,0.9);margin-bottom:16px;line-height:1.5}
        .divider{height:1px;background:var(--border);margin:20px 0}
        .link{text-align:center;font-size:14px;color:var(--muted)}
        .link a{color:var(--red);text-decoration:none;font-weight:600}
        .level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
        .level-btn{padding:10px 4px;border:2px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}
        .level-btn.active{border-color:var(--red);background:rgba(233,69,96,0.1);color:var(--red)}
        .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:12px 16px;border-radius:10px;background:rgba(13,17,23,.88);backdrop-filter:blur(8px);border:1px solid rgba(233,69,96,.35);color:var(--text);z-index:3000;font-size:13px;max-width:90vw;text-align:center;animation:toastIn .2s ease,toastOut .25s ease 2.7s forwards}
        .section-title,.tip,.divider,.link{animation:fadeUp .45s ease both}
        .tip{animation-delay:.08s}
        .section-title{animation-delay:.1s}
        .divider,.link{animation-delay:.5s}
        @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(18px,-14px) scale(1.05)}}
        @keyframes bgFloat{0%,100%{background-position:0% 0%,0 0}50%{background-position:18% 8%,0 0}}
        @keyframes borderFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
        @keyframes sheen{0%,70%,100%{left:-80%;opacity:0}12%,38%{opacity:1}45%{left:135%;opacity:0}}
        @keyframes iconPulse{0%,100%{transform:translateY(0);box-shadow:0 8px 24px rgba(233,69,96,.3)}50%{transform:translateY(-2px);box-shadow:0 12px 30px rgba(233,69,96,.45)}}
        @keyframes ringPulse{0%{transform:scale(.94);opacity:0}30%{opacity:.35}100%{transform:scale(1.15);opacity:0}}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-14px)}}
        @media (max-width:768px){body::before,body::after{filter:blur(34px)}.logo-icon{animation-duration:2.8s}}
        @keyframes floatIn{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-icon">🎓</div>
        <h1>Create Account</h1>
        <p>Smart Attendance System</p>
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="tip">📱 Your account will be bound to your device on first login.</div>
    <form method="POST" id="registerForm">
        <div class="section-title">Personal Information</div>
        <div class="form-group"><label>Full Name</label><input type="text" name="full_name" placeholder="e.g. Chibuike Anthony" required></div>
        <div class="form-group"><label>Matric Number</label><input type="text" name="matric_no" placeholder="e.g. 2022/SC/25026" required></div>
        <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="chibuike9@gmail.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Create a strong password" required></div>
        <div class="form-group"><label>Parent/Guardian Phone</label><input type="tel" name="parent_phone" placeholder="e.g. 08012345678" required></div>
        <div class="section-title">Academic Information</div>
        <div class="form-group">
            <label>Faculty</label>
            <select name="faculty_id" id="faculty_select" required onchange="loadDepartments(this.value)">
                <option value="">— Select Faculty —</option>
            </select>
        </div>
        <div class="form-group">
            <label>Department</label>
            <select name="department_id" id="dept_select" required disabled>
                <option value="">— Select Department —</option>
            </select>
        </div>
        <div class="form-group">
            <label>Level</label>
            <div class="level-grid">
                <button type="button" class="level-btn" onclick="setLevel(100,this)">100</button>
                <button type="button" class="level-btn" onclick="setLevel(200,this)">200</button>
                <button type="button" class="level-btn" onclick="setLevel(300,this)">300</button>
                <button type="button" class="level-btn" onclick="setLevel(400,this)">400</button>
                <button type="button" class="level-btn" onclick="setLevel(500,this)">500</button>
            </div>
            <input type="hidden" name="level" id="level-hidden">
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>
    <div class="divider"></div>
    <div class="link"><p>Already registered? <a href="/login">Login here</a></p></div>
</div>
<script>
    fetch('/api/faculties').then(r=>r.json()).then(data=>{
        const sel=document.getElementById('faculty_select');
        data.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;sel.appendChild(o);});
    });
    function loadDepartments(fid){
        const sel=document.getElementById('dept_select');
        sel.innerHTML='<option value="">— Select Department —</option>';
        sel.disabled=true;
        if(!fid)return;
        fetch('/api/departments/'+fid).then(r=>r.json()).then(data=>{
            data.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=d.name;sel.appendChild(o);});
            sel.disabled=false;
        });
    }
    function setLevel(level,btn){
        document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('level-hidden').value=level;
    }
    function showToast(message){
        const toast=document.createElement('div');
        toast.className='toast';
        toast.textContent=message;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),3000);
    }
    document.getElementById('registerForm').addEventListener('submit',function(e){
        if(!document.getElementById('level-hidden').value){e.preventDefault();showToast('Please select your level');}
    });
</script>
</body>
</html>
